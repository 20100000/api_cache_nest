version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: nest_postgres_db
    restart: always
    environment:
      POSTGRES_USER: tiago
      POSTGRES_PASSWORD: tiago@123
      POSTGRES_DB: nest_api
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: nest_redis_cache
    restart: always
    ports:
      - "6379:6379"

  api:
    build: .
    container_name: nest_api_app
    restart: always
    ports:
      - "3000:3000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: tiago    
      DB_PASS: tiago@123
      DB_NAME: nest_api
      REDIS_HOST: redis 
      REDIS_PORT: 6379
    depends_on:
      - postgres
      - redis

volumes:
  pgdata:
